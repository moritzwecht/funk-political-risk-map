<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Political Risk Map 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div style="display:flex;align-items:baseline;">
      <h1 class="header__title" data-i18n="title">Political Risk Map 2026</h1>
      <span class="header__subtitle" data-i18n="subtitle">Interactive Risk Assessment</span>
    </div>
    <div class="header__controls">
      <div class="lang-toggle">
        <button data-lang="en" class="active">EN</button>
        <button data-lang="de">DE</button>
      </div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Search -->
    <div class="section">
      <div class="section__title" data-i18n="search">Search</div>
      <input class="search-input" type="text" id="countrySearch" data-i18n-placeholder="searchPlaceholder" placeholder="Search country...">
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Sliders -->
    <div class="section">
      <div class="section__title" data-i18n="riskWeighting">Risk Weighting</div>
      <div id="sliderContainer"></div>
      <button class="btn-reset" id="resetBtn" data-i18n="reset">Reset</button>
    </div>

    <!-- Options -->
    <div class="section">
      <div class="section__title" data-i18n="options">Options</div>
      <div class="toggle-row">
        <span class="toggle-row__label" data-i18n="missingDataLabel">Estimate score when data is missing</span>
        <label class="toggle-switch">
          <input type="checkbox" id="missingDataToggle" checked>
          <span class="toggle-switch__track"></span>
        </label>
      </div>
    </div>

    <!-- Legend -->
    <div class="section">
      <div class="section__title" data-i18n="legend">Legend</div>
      <div class="legend" id="legendBar"></div>
      <div class="legend__labels">
        <span data-i18n="lowRisk">Low Risk</span>
        <span data-i18n="highRisk">High Risk</span>
      </div>
    </div>
  </aside>

  <!-- Map -->
  <div class="map-container" id="mapContainer">
    <div class="loading-overlay" id="loading">
      <div class="loading-spinner"></div>
    </div>
    <div class="zoom-controls">
      <button id="zoomIn">+</button>
      <button id="zoomOut">−</button>
      <button id="zoomReset">⌂</button>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip">
    <div class="tooltip__name" id="tooltipName"></div>
    <div class="tooltip__score" id="tooltipScore"></div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-panel__header">
      <div>
        <div class="detail-panel__name" id="detailName"></div>
        <div class="detail-panel__meta" id="detailMeta"></div>
      </div>
      <button class="detail-panel__close" id="detailClose">✕</button>
    </div>
    <div class="detail-panel__body">
      <div class="detail-panel__grade-row">
        <div class="detail-panel__grade-badge" id="detailGradeBadge"></div>
        <div class="detail-panel__grade-info" id="detailGradeInfo"></div>
      </div>
      <div id="detailBars"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ============================================
// Political Risk Map 2026 — Main Application
// ============================================

(function() {
  'use strict';

  // ---- i18n ----
  const I18N = {
    en: {
      title: 'Political Risk Map 2026',
      subtitle: 'Interactive Risk Assessment',
      search: 'Search',
      searchPlaceholder: 'Search country...',
      riskWeighting: 'Risk Weighting',
      reset: 'Reset Weights',
      options: 'Options',
      missingDataLabel: 'Estimate score when data is missing',
      legend: 'Legend',
      lowRisk: 'Low Risk',
      highRisk: 'High Risk',
      noData: 'No data',
      grade: 'Grade',
      trend: 'Trend',
      trendUp: 'Increasing ↑',
      trendStable: 'Stable →',
      weightedScore: 'Weighted Score',
      commercialRisk: 'Commercial Risk',
      gradeDescriptions: {
        A: 'Very Low Risk', B: 'Low Risk', C: 'Moderate-Low Risk',
        D: 'Moderate Risk', E: 'Moderate-High Risk', F: 'High Risk', G: 'Very High Risk'
      },
      categories: {
        op: 'Operational Risk',
        oc: 'Ownership & Control Risk',
        tr: 'Transfer Risk',
        co: 'Corruption Risk',
        te: 'Terrorism Risk'
      }
    },
    de: {
      title: 'Political Risk Map 2026',
      subtitle: 'Interaktive Risikobewertung',
      search: 'Suche',
      searchPlaceholder: 'Land suchen...',
      riskWeighting: 'Risikogewichtung',
      reset: 'Gewichtung zurücksetzen',
      options: 'Optionen',
      missingDataLabel: 'Score schätzen bei fehlenden Daten',
      legend: 'Legende',
      lowRisk: 'Niedriges Risiko',
      highRisk: 'Hohes Risiko',
      noData: 'Keine Daten',
      grade: 'Stufe',
      trend: 'Trend',
      trendUp: 'Steigend ↑',
      trendStable: 'Stabil →',
      weightedScore: 'Gewichteter Score',
      commercialRisk: 'Kommerzielles Risiko',
      gradeDescriptions: {
        A: 'Sehr niedriges Risiko', B: 'Niedriges Risiko', C: 'Moderat-niedriges Risiko',
        D: 'Moderates Risiko', E: 'Moderat-hohes Risiko', F: 'Hohes Risiko', G: 'Sehr hohes Risiko'
      },
      categories: {
        op: 'Operationelles Risiko',
        oc: 'Eigentums- & Kontrollrisiko',
        tr: 'Transferrisiko',
        co: 'Korruptionsrisiko',
        te: 'Terrorismusrisiko'
      }
    }
  };

  let lang = 'en';
  function t(key) {
    const keys = key.split('.');
    let val = I18N[lang];
    for (const k of keys) val = val?.[k];
    return val || key;
  }

  // ---- State ----
  const CATS = ['op', 'oc', 'tr', 'co', 'te'];
  const weights = { op: 50, oc: 50, tr: 50, co: 50, te: 50 };
  let estimateMissing = true;
  let selectedCountry = null;

  // Build lookup by alpha3
  const dataByA3 = {};
  const dataByA2 = {};
  COUNTRY_DATA.forEach(c => {
    dataByA3[c.a3] = c;
    dataByA2[c.a2] = c;
  });

  // ---- Color scale ----
  const RISK_COLORS = ['#10b981','#34d399','#a3e635','#facc15','#fb923c','#f87171','#dc2626'];
  const GRADE_COLORS = { A:'#10b981', B:'#34d399', C:'#a3e635', D:'#facc15', E:'#fb923c', F:'#f87171', G:'#dc2626' };

  function scoreToColor(score) {
    if (score == null) return '#1a2235';
    const s = Math.max(0, Math.min(1, score));
    const idx = s * (RISK_COLORS.length - 1);
    const lo = Math.floor(idx);
    const hi = Math.min(lo + 1, RISK_COLORS.length - 1);
    const frac = idx - lo;
    return lerpColor(RISK_COLORS[lo], RISK_COLORS[hi], frac);
  }

  function lerpColor(a, b, t) {
    const ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
    const br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
    const r = Math.round(ar + (br-ar)*t);
    const g = Math.round(ag + (bg-ag)*t);
    const bl = Math.round(ab + (bb-ab)*t);
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bl.toString(16).padStart(2,'0')}`;
  }

  // ---- Weighted score ----
  function computeScore(country) {
    const total = CATS.reduce((s, c) => s + weights[c], 0);
    if (total === 0) return null;

    let scoreSum = 0, weightSum = 0;
    for (const cat of CATS) {
      if (weights[cat] === 0) continue;
      const val = country[cat];
      if (val == null) {
        if (!estimateMissing) return null;
        continue;
      }
      scoreSum += val * weights[cat];
      weightSum += weights[cat];
    }
    if (weightSum === 0) return null;
    return scoreSum / weightSum;
  }

  // ---- Build sliders ----
  function buildSliders() {
    const container = document.getElementById('sliderContainer');
    container.innerHTML = '';
    CATS.forEach(cat => {
      const group = document.createElement('div');
      group.className = 'slider-group';
      const total = CATS.reduce((s, c) => s + weights[c], 0);
      const pct = total > 0 ? Math.round(weights[cat] / total * 100) : 0;
      group.innerHTML = `
        <div class="slider-label">
          <span class="slider-label__name">${t('categories.' + cat)}</span>
          <span class="slider-label__value" id="val_${cat}">${weights[cat]}</span>
          <span class="slider-label__pct" id="pct_${cat}">${pct}%</span>
        </div>
        <input type="range" min="0" max="100" value="${weights[cat]}" id="slider_${cat}">
      `;
      container.appendChild(group);
      const slider = group.querySelector('input');
      slider.addEventListener('input', (e) => {
        weights[cat] = parseInt(e.target.value);
        updateSliderLabels();
        updateMap();
        if (selectedCountry) updateDetailPanel(selectedCountry);
      });
    });
  }

  function updateSliderLabels() {
    const total = CATS.reduce((s, c) => s + weights[c], 0);
    CATS.forEach(cat => {
      document.getElementById('val_' + cat).textContent = weights[cat];
      const pct = total > 0 ? Math.round(weights[cat] / total * 100) : 0;
      document.getElementById('pct_' + cat).textContent = pct + '%';
    });
  }

  // ---- Legend ----
  function buildLegend() {
    const bar = document.getElementById('legendBar');
    bar.innerHTML = '';
    RISK_COLORS.forEach(color => {
      const el = document.createElement('div');
      el.className = 'legend__bar';
      el.style.background = color;
      bar.appendChild(el);
    });
  }

  // ---- Tooltip ----
  const tooltip = document.getElementById('tooltip');
  const tooltipName = document.getElementById('tooltipName');
  const tooltipScore = document.getElementById('tooltipScore');

  function showTooltip(country, event) {
    const name = lang === 'de' ? country.de : country.en;
    const score = computeScore(country);
    tooltipName.textContent = name;
    let scoreText = score != null ? `${t('weightedScore')}: ${(score * 100).toFixed(0)}%` : t('noData');
    if (country.gr) scoreText += `  |  ${t('grade')}: ${country.gr}`;
    tooltipScore.textContent = scoreText;
    tooltip.classList.add('visible');
    positionTooltip(event);
  }

  function positionTooltip(event) {
    const pad = 12;
    let x = event.clientX + pad;
    let y = event.clientY + pad;
    const rect = tooltip.getBoundingClientRect();
    if (x + rect.width > window.innerWidth) x = event.clientX - rect.width - pad;
    if (y + rect.height > window.innerHeight) y = event.clientY - rect.height - pad;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }

  function hideTooltip() {
    tooltip.classList.remove('visible');
  }

  // ---- Detail Panel ----
  function openDetailPanel(country) {
    selectedCountry = country;
    // Highlight on map
    document.querySelectorAll('.country.selected').forEach(el => el.classList.remove('selected'));
    const path = document.querySelector(`.country[data-a3="${country.a3}"]`);
    if (path) path.classList.add('selected');

    updateDetailPanel(country);
    document.getElementById('detailPanel').classList.add('open');
  }

  function updateDetailPanel(country) {
    const name = lang === 'de' ? country.de : country.en;
    document.getElementById('detailName').textContent = name;
    document.getElementById('detailMeta').textContent = `${country.a2} · ${country.a3} · ${country.num}`;

    const badge = document.getElementById('detailGradeBadge');
    if (country.gr) {
      badge.textContent = country.gr;
      badge.style.background = GRADE_COLORS[country.gr] || '#555';
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }

    const trendText = country.td === 1 ? t('trendUp') : country.td === 0 ? t('trendStable') : '—';
    const gradeDesc = country.gr ? t('gradeDescriptions.' + country.gr) : '';
    document.getElementById('detailGradeInfo').innerHTML =
      `<div>${t('commercialRisk')}: ${gradeDesc}</div>` +
      `<div class="detail-panel__trend">${t('trend')}: ${trendText}</div>` +
      `<div style="margin-top:4px;font-family:var(--font-mono)">${t('weightedScore')}: ${computeScore(country) != null ? (computeScore(country)*100).toFixed(1)+'%' : '—'}</div>`;

    // Risk bars
    const barsContainer = document.getElementById('detailBars');
    barsContainer.innerHTML = '';
    CATS.forEach(cat => {
      const val = country[cat];
      const bar = document.createElement('div');
      bar.className = 'risk-bar';
      const pctVal = val != null ? (val * 100).toFixed(1) + '%' : '—';
      const width = val != null ? (val * 100) + '%' : '0%';
      const color = val != null ? scoreToColor(val) : '#333';
      bar.innerHTML = `
        <div class="risk-bar__header">
          <span class="risk-bar__name">${t('categories.' + cat)}</span>
          <span class="risk-bar__value">${pctVal}</span>
        </div>
        <div class="risk-bar__track">
          <div class="risk-bar__fill" style="width:${width};background:${color}"></div>
        </div>
      `;
      barsContainer.appendChild(bar);
    });
  }

  function closeDetailPanel() {
    selectedCountry = null;
    document.getElementById('detailPanel').classList.remove('open');
    document.querySelectorAll('.country.selected').forEach(el => el.classList.remove('selected'));
  }

  // ---- Search ----
  function initSearch() {
    const input = document.getElementById('countrySearch');
    const results = document.getElementById('searchResults');

    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      results.innerHTML = '';
      if (q.length < 2) return;

      const matches = COUNTRY_DATA.filter(c => {
        return c.en.toLowerCase().includes(q) || c.de.toLowerCase().includes(q) ||
               c.a2.toLowerCase() === q || c.a3.toLowerCase() === q;
      }).slice(0, 10);

      matches.forEach(c => {
        const name = lang === 'de' ? c.de : c.en;
        const div = document.createElement('div');
        div.className = 'search-result';
        const gradeColor = c.gr ? GRADE_COLORS[c.gr] : 'transparent';
        div.innerHTML = `
          <span class="search-result__name">${name}</span>
          ${c.gr ? `<span class="search-result__grade" style="background:${gradeColor};color:#000">${c.gr}</span>` : ''}
        `;
        div.addEventListener('click', () => {
          openDetailPanel(c);
          zoomToCountry(c.a3);
          results.innerHTML = '';
          input.value = name;
        });
        results.appendChild(div);
      });
    });
  }

  // ---- Map rendering ----
  let svg, g, projection, path, zoom;
  let geoData = null;

  // ISO Alpha-3 mapping overrides for Natural Earth / World Atlas topojson
  // The topojson uses numeric IDs which we must map
  const TOPO_URLS = [
    'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json',
    'https://unpkg.com/world-atlas@2/countries-50m.json',
    'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',
    'https://unpkg.com/world-atlas@2/countries-110m.json'
  ];

  async function initMap() {
    const container = document.getElementById('mapContainer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    // Create SVG
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', width);
    svg.setAttribute('height', height);
    svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
    container.insertBefore(svg, container.firstChild);

    // Load D3 and topojson dynamically with CDN fallbacks
    await loadScriptWithFallbacks(
      [
        'https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js',
        'https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js',
        'https://unpkg.com/d3@7.9.0/dist/d3.min.js'
      ],
      () => typeof window.d3 !== 'undefined',
      'd3'
    );
    await loadScriptWithFallbacks(
      [
        'https://cdnjs.cloudflare.com/ajax/libs/topojson-client/3.1.0/topojson-client.min.js',
        'https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js',
        'https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js'
      ],
      () => typeof window.topojson !== 'undefined',
      'topojson-client'
    );

    // Fetch world data
    const world = await fetchJsonWithFallbacks(TOPO_URLS);
    const countries = topojson.feature(world, world.objects.countries);

    // Build numeric→alpha3 lookup from our data
    const numToData = {};
    COUNTRY_DATA.forEach(c => {
      numToData[String(parseInt(c.num))] = c;
    });

    // Projection
    projection = d3.geoNaturalEarth1()
      .precision(0.2)
      .fitSize([width - 20, height - 20], countries)
      .translate([width/2, height/2]);

    path = d3.geoPath().projection(projection);

    // Zoom
    g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    svg.appendChild(g);

    zoom = d3.zoom()
      .scaleExtent([1, 12])
      .on('zoom', (event) => {
        g.setAttribute('transform', `translate(${event.transform.x},${event.transform.y}) scale(${event.transform.k})`);
      });

    d3.select(svg).call(zoom);

    // Draw countries
    countries.features.forEach(feature => {
      const numId = String(feature.id);
      const country = numToData[numId];

      const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      el.setAttribute('d', path(feature));
      el.setAttribute('class', 'country' + (country ? '' : ' no-data'));
      if (country) {
        el.setAttribute('data-a3', country.a3);
        el.setAttribute('data-num', numId);
        const score = computeScore(country);
        el.setAttribute('fill', scoreToColor(score));

        el.addEventListener('mouseenter', (e) => showTooltip(country, e));
        el.addEventListener('mousemove', (e) => positionTooltip(e));
        el.addEventListener('mouseleave', hideTooltip);
        el.addEventListener('click', () => openDetailPanel(country));
      } else {
        el.setAttribute('fill', '#1a2235');
      }
      g.appendChild(el);
    });

    // Hide loading
    document.getElementById('loading').classList.add('hidden');
  }

  function updateMap() {
    document.querySelectorAll('.country:not(.no-data)').forEach(el => {
      const a3 = el.getAttribute('data-a3');
      const country = dataByA3[a3];
      if (country) {
        const score = computeScore(country);
        el.setAttribute('fill', scoreToColor(score));
        if (score == null && !estimateMissing) {
          el.classList.add('no-data');
        } else {
          el.classList.remove('no-data');
        }
      }
    });
  }

  function zoomToCountry(a3) {
    if (!isMapReady()) return;
    const el = document.querySelector(`.country[data-a3="${a3}"]`);
    if (!el) return;
    // Get bounding box of the path element
    const bbox = el.getBBox();
    const svgEl = svg;
    const width = svgEl.clientWidth;
    const height = svgEl.clientHeight;

    const scale = Math.min(8, 0.8 / Math.max(bbox.width / width, bbox.height / height));
    const tx = width/2 - scale * (bbox.x + bbox.width/2);
    const ty = height/2 - scale * (bbox.y + bbox.height/2);

    d3.select(svgEl).transition().duration(600)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  // ---- i18n apply ----
  function applyLang() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      el.textContent = t(key);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      el.placeholder = t(key);
    });
    buildSliders();
    updateSliderLabels();
    if (selectedCountry) updateDetailPanel(selectedCountry);
  }

  // ---- Helpers ----
  function isMapReady() {
    return typeof window.d3 !== 'undefined' && !!svg && !!zoom && !!projection;
  }

  function showInitError() {
    const loadingEl = document.getElementById('loading');
    if (!loadingEl) return;
    const message = lang === 'de'
      ? 'Karte konnte nicht geladen werden. Bitte Internetzugang und Content-Blocker pruefen und die Seite neu laden.'
      : 'Map failed to load. Please check internet access and content blockers, then reload the page.';
    loadingEl.innerHTML = `<div style="max-width:340px;padding:16px;text-align:center;font-size:13px;line-height:1.5;color:#e8ecf4;">${message}</div>`;
    loadingEl.classList.remove('hidden');
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.onload = resolve;
      script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
      document.head.appendChild(script);
    });
  }

  async function loadScriptWithFallbacks(sources, isLoaded, libName) {
    if (isLoaded()) return;
    const failures = [];
    for (const src of sources) {
      try {
        await loadScript(src);
        if (isLoaded()) return;
        failures.push(`${src} (loaded, but "${libName}" was not found on window)`);
      } catch (err) {
        failures.push(`${src} (${err.message})`);
      }
    }
    throw new Error(`Failed to load ${libName} from all sources: ${failures.join(' | ')}`);
  }

  async function fetchJsonWithFallbacks(urls) {
    const failures = [];
    for (const url of urls) {
      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return await response.json();
      } catch (err) {
        failures.push(`${url} (${err.message})`);
      }
    }
    throw new Error(`Failed to fetch map data from all sources: ${failures.join(' | ')}`);
  }

  // ---- Init ----
  async function init() {
    buildSliders();
    buildLegend();
    initSearch();

    // Language toggle
    document.querySelectorAll('.lang-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        lang = btn.getAttribute('data-lang');
        document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.documentElement.lang = lang;
        applyLang();
      });
    });

    // Reset
    document.getElementById('resetBtn').addEventListener('click', () => {
      CATS.forEach(cat => {
        weights[cat] = 50;
        document.getElementById('slider_' + cat).value = 50;
      });
      updateSliderLabels();
      updateMap();
      if (selectedCountry) updateDetailPanel(selectedCountry);
    });

    // Missing data toggle
    document.getElementById('missingDataToggle').addEventListener('change', (e) => {
      estimateMissing = e.target.checked;
      updateMap();
      if (selectedCountry) updateDetailPanel(selectedCountry);
    });

    // Detail close
    document.getElementById('detailClose').addEventListener('click', closeDetailPanel);

    // Zoom controls
    document.getElementById('zoomIn').addEventListener('click', () => {
      if (!isMapReady()) return;
      d3.select(svg).transition().duration(300).call(zoom.scaleBy, 1.5);
    });
    document.getElementById('zoomOut').addEventListener('click', () => {
      if (!isMapReady()) return;
      d3.select(svg).transition().duration(300).call(zoom.scaleBy, 0.67);
    });
    document.getElementById('zoomReset').addEventListener('click', () => {
      if (!isMapReady()) return;
      d3.select(svg).transition().duration(500).call(zoom.transform, d3.zoomIdentity);
    });

    // Load map
    await initMap();
  }

  // Resize handling
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (!isMapReady()) return;
      const container = document.getElementById('mapContainer');
      svg.setAttribute('width', container.clientWidth);
      svg.setAttribute('height', container.clientHeight);
      svg.setAttribute('viewBox', `0 0 ${container.clientWidth} ${container.clientHeight}`);
      projection.fitSize([container.clientWidth - 20, container.clientHeight - 20],
        { type: 'Sphere' }).translate([container.clientWidth/2, container.clientHeight/2]);
      // Re-render would need full redraw - simplified here
    }, 300);
  });

  init().catch((err) => {
    console.error('Failed to initialize app:', err);
    showInitError();
  });
})();
</script>
</body>
</html>
